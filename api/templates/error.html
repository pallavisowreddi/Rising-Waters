<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rising Waters - System Error</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top navbar-dark py-3">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <i class="bi bi-water text-primary fs-3 me-2"></i>
        <span class="logo-text fw-bold">Rising Waters</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/Predict">Predictor</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Error Container -->
  <main class="container my-5 py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6 text-center">
        <div class="card bg-navy-light p-4 p-md-5 border border-dark rounded-4 shadow-lg">
          <div class="fs-1 text-danger mb-3">
            <i class="bi bi-exclamation-triangle"></i>
          </div>
          <h1 class="text-white fw-bold font-display">System Error ({{ code }})</h1>
          <p class="text-secondary mt-2 mb-4">{{ message }}</p>
          <a href="/" class="btn btn-primary px-4 py-3 fw-bold rounded-3">
            <i class="bi bi-house me-1"></i> Return Home
          </a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-4 border-top border-dark mt-auto">
    <div class="container text-center">
      <p class="text-muted mb-0 small">&copy; 2026 Rising Waters Project. Prepared for SmartBridge Internship.</p>
    </div>
  </footer>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
